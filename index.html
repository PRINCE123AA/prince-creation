<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timezone Clock Application</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 50px;
        }
        .card {
            background: linear-gradient(135deg, #4a4a4a, #2a2a2a);
            border-radius: 15px;
            padding: 20px;
            margin: 15px;
            width: 250px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
        }
        h2 {
            margin: 0;
            font-size: 24px;
        }
        .time {
            font-size: 36px;
        }
        .timezone {
            font-size: 18px;
            color: #b3b3b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="utc">
            <h2>UTC</h2>
            <div class="time" id="utc-time"></div>
            <div class="timezone">Coordinated Universal Time</div>
        </div>
        <div class="card" id="pst">
            <h2>PST</h2>
            <div class="time" id="pst-time"></div>
            <div class="timezone">Pacific Standard Time</div>
        </div>
        <div class="card" id="est">
            <h2>EST</h2>
            <div class="time" id="est-time"></div>
            <div class="timezone">Eastern Standard Time</div>
        </div>
        <div class="card" id="cet">
            <h2>CET</h2>
            <div class="time" id="cet-time"></div>
            <div class="timezone">Central European Time</div>
        </div>
    </div>
    <script>
        function updateClock() {
            const utc = new Date();
            document.getElementById('utc-time').textContent = utc.toISOString().replace('T', ' ').slice(0, 19);
            // Convert UTC to other timezones
            const pst = new Date(utc.getTime() - 8 * 3600 * 1000);
            document.getElementById('pst-time').textContent = pst.toISOString().replace('T', ' ').slice(0, 19);
            const est = new Date(utc.getTime() - 5 * 3600 * 1000);
            document.getElementById('est-time').textContent = est.toISOString().replace('T', ' ').slice(0, 19);
            const cet = new Date(utc.getTime() + 1 * 3600 * 1000);
            document.getElementById('cet-time').textContent = cet.toISOString().replace('T', ' ').slice(0, 19);
        }
        setInterval(updateClock, 1000);
        updateClock(); // Initial call to display time right away
    </script>
</body>
</html>
