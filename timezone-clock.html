<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Timezone Clock</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            background-color: #f0f0f0;\n            margin: 0;\n            padding: 20px;\n        }\n        .clock {\n            border: 1px solid #ccc;\n            border-radius: 5px;\n            padding: 20px;\n            background: white;\n            box-shadow: 0 2px 5px rgba(0,0,0,0.1);\n            margin: 10px;\n            width: 250px;\n            text-align: center;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock" id="clockUTC">UTC: <span id="utcTime"></span></div>\n    <div class="clock" id="clockEST">Eastern Standard Time: <span id="estTime"></span></div>\n    <div class="clock" id="clockPST">Pacific Standard Time: <span id="pstTime"></span></div>\n    <script>\n        function updateClock() {\n            const utc = new Date();\n            document.getElementById('utcTime').textContent = utc.toUTCString().slice(17, 25);\n            const est = new Date(utc.toLocaleString('en-US', { timeZone: 'America/New_York' }));\n            document.getElementById('estTime').textContent = est.toLocaleTimeString();\n            const pst = new Date(utc.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));\n            document.getElementById('pstTime').textContent = pst.toLocaleTimeString();\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    </script>\n</body>\n</html>
